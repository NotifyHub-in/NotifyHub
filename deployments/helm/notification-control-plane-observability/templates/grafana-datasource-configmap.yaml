apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-datasource
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
data:
  datasource.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "notification-control-plane-observability.fullname" . }}-prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST
