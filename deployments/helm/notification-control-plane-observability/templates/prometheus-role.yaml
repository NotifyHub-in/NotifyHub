apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-prometheus
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
