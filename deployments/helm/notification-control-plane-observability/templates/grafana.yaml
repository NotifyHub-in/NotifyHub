apiVersion: v1
kind: Secret
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-admin
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: {{ .Values.grafana.adminUser | quote }}
  admin-password: {{ .Values.grafana.adminPassword | quote }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-datasource
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
data:
  datasource.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "notification-control-plane-observability.fullname" . }}-prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          httpMethod: POST

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-dashboards
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
data:
  notification-control-plane-overview.json: |
{{ .Files.Get "dashboards/notification-control-plane-overview.json" | indent 4 }}
  notification-control-plane-load-test.json: |
{{ .Files.Get "dashboards/notification-control-plane-load-test.json" | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-dashboard-provider
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: Notification Control Plane
        folder: Notification Control Plane
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
      - name: Notification Control Plane Alerts
        folder: Notification Control Plane
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/alert-dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-alerts-dashboard
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
data:
  notification-control-plane-alerts.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(ALERTS{alertstate=\"firing\"})",
              "legendFormat": "Firing alerts",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Firing Alerts",
          "type": "stat"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["notification-control-plane", "alerts"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Notification Control Plane Alerts",
      "version": 1,
      "weekStart": ""
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      {{- include "notification-control-plane-observability.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "notification-control-plane-observability.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-admin
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: alert-dashboards
              mountPath: /var/lib/grafana/alert-dashboards
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasource
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-datasource
        - name: dashboard-provider
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-dashboards
        - name: alert-dashboards
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-alerts-dashboard

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  selector:
    {{- include "notification-control-plane-observability.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
    - name: http
      port: {{ .Values.grafana.service.port }}
      targetPort: http
