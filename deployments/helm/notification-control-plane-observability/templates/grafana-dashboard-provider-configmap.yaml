apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-dashboard-provider
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: Notification Control Plane
        folder: Notification Control Plane
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
      - name: Notification Control Plane Alerts
        folder: Notification Control Plane
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/alert-dashboards
