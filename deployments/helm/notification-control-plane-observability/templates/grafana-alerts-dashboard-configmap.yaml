apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-alerts-dashboard
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
data:
  notification-control-plane-alerts.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(ALERTS{alertstate=\"firing\"})",
              "legendFormat": "Firing alerts",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Firing Alerts",
          "type": "stat"
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["notification-control-plane", "alerts"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Notification Control Plane Alerts",
      "version": 1,
      "weekStart": ""
    }
