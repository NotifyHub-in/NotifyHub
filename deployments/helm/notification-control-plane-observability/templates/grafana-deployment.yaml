apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      {{- include "notification-control-plane-observability.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "notification-control-plane-observability.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-admin
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: alert-dashboards
              mountPath: /var/lib/grafana/alert-dashboards
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasource
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-datasource
        - name: dashboard-provider
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-dashboards
        - name: alert-dashboards
          configMap:
            name: {{ include "notification-control-plane-observability.fullname" . }}-grafana-alerts-dashboard
