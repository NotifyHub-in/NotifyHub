apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-cadvisor
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: cadvisor
spec:
  selector:
    matchLabels:
      {{- include "notification-control-plane-observability.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cadvisor
  template:
    metadata:
      labels:
        {{- include "notification-control-plane-observability.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cadvisor
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cadvisor
          image: "{{ .Values.cadvisor.image.repository }}:{{ .Values.cadvisor.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          args:
            - --docker_only=true
          ports:
            - name: http
              containerPort: {{ .Values.cadvisor.service.port }}
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: disk
              mountPath: /dev/disk
              readOnly: true
          resources:
            {{- toYaml .Values.cadvisor.resources | nindent 12 }}
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: docker
          hostPath:
            path: /var/lib/docker
        - name: disk
          hostPath:
            path: /dev/disk

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification-control-plane-observability.fullname" . }}-cadvisor
  labels:
    {{- include "notification-control-plane-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: cadvisor
spec:
  type: ClusterIP
  selector:
    {{- include "notification-control-plane-observability.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: cadvisor
  ports:
    - name: http
      port: {{ .Values.cadvisor.service.port }}
      targetPort: http
