{{- range .Values.connectors.definitions }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notification-control-plane.componentName" (list $ .name) }}
  labels:
    {{- include "notification-control-plane.labels" $ | nindent 4 }}
spec:
  replicas: {{ $.Values.connectors.replicaCount }}
  selector:
    matchLabels:
      {{- include "notification-control-plane.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "notification-control-plane.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ .name }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .name }}
          image: {{ include "notification-control-plane.image" (list $ .name) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .port }}
          env:
            - name: APP_ENV
              value: {{ $.Values.global.appEnv | quote }}
            - name: APP_VERSION
              value: {{ default $.Chart.AppVersion $.Values.global.appVersion | quote }}
            - name: PORT
              value: {{ .port | quote }}
          {{- if .envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .envFromSecret }}
          {{- end }}
          {{- if $.Values.global.secretVolume.enabled }}
          volumeMounts:
            - name: notification-secrets
              mountPath: {{ $.Values.global.secretVolume.mountPath }}
              readOnly: {{ $.Values.global.secretVolume.readOnly }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
      {{- if $.Values.global.secretVolume.enabled }}
      volumes:
        - name: notification-secrets
          secret:
            secretName: {{ include "notification-control-plane.secretVolumeName" $ }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification-control-plane.componentName" (list $ .name) }}
  labels:
    {{- include "notification-control-plane.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "notification-control-plane.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
  ports:
    - name: http
      port: {{ .port }}
      targetPort: http
{{- end }}
