apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification-control-plane.componentName" (list . "api") }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "notification-control-plane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: http

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification-control-plane.componentName" (list . "worker") }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "notification-control-plane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  ports:
    - name: http
      port: 8081
      targetPort: http

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "notification-control-plane.componentName" (list . "callback-gateway") }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "notification-control-plane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: callback-gateway
  ports:
    - name: http
      port: 8082
      targetPort: http
