apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notification-control-plane.componentName" (list . "api") }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "notification-control-plane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "notification-control-plane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "notification-control-plane.image" (list . "api") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: APP_ENV
              value: {{ .Values.global.appEnv | quote }}
            - name: APP_VERSION
              value: {{ default .Chart.AppVersion .Values.global.appVersion | quote }}
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: DATABASE_URL
              value: {{ required "database.url is required" .Values.database.url | quote }}
            - name: KAFKA_BROKERS
              value: {{ required "kafka.brokers is required" .Values.kafka.brokers | quote }}
            - name: KAFKA_NOTIFICATION_TOPIC
              value: {{ .Values.kafka.notificationTopic | quote }}
            - name: NOTIFICATION_API_AUTH_REQUIRED
              value: {{ ternary "true" "false" .Values.api.authRequired | quote }}
            - name: NOTIFICATION_ADMIN_API_AUTH_REQUIRED
              value: "true"
            - name: NOTIFICATION_ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "notification-control-plane.authSecretName" . }}
                  key: {{ .Values.auth.adminTokenKey }}
            - name: NOTIFICATION_READONLY_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "notification-control-plane.authSecretName" . }}
                  key: {{ .Values.auth.readTokenKey }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notification-control-plane.componentName" (list . "worker") }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "notification-control-plane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "notification-control-plane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "notification-control-plane.image" (list . "worker") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.port }}
          env:
            - name: APP_ENV
              value: {{ .Values.global.appEnv | quote }}
            - name: APP_VERSION
              value: {{ default .Chart.AppVersion .Values.global.appVersion | quote }}
            - name: PORT
              value: {{ .Values.worker.port | quote }}
            - name: DATABASE_URL
              value: {{ required "database.url is required" .Values.database.url | quote }}
            - name: KAFKA_BROKERS
              value: {{ required "kafka.brokers is required" .Values.kafka.brokers | quote }}
            - name: KAFKA_NOTIFICATION_TOPIC
              value: {{ .Values.kafka.notificationTopic | quote }}
            - name: KAFKA_WORKER_GROUP_ID
              value: {{ .Values.kafka.workerGroupID | quote }}
            - name: CONNECTOR_WEBHOOK_URL
              value: {{ printf "http://%s:8093" (include "notification-control-plane.componentName" (list . "connector-webhook")) | quote }}
            - name: CONNECTOR_EMAIL_URL
              value: {{ printf "http://%s:8091" (include "notification-control-plane.componentName" (list . "connector-email")) | quote }}
            - name: CONNECTOR_SMS_URL
              value: {{ printf "http://%s:8092" (include "notification-control-plane.componentName" (list . "connector-sms")) | quote }}
            - name: CONNECTOR_PUSH_URL
              value: {{ printf "http://%s:8094" (include "notification-control-plane.componentName" (list . "connector-push")) | quote }}
            - name: CONNECTOR_WHATSAPP_URL
              value: {{ printf "http://%s:8095" (include "notification-control-plane.componentName" (list . "connector-whatsapp")) | quote }}
          {{- if .Values.global.secretVolume.enabled }}
          volumeMounts:
            - name: notification-secrets
              mountPath: {{ .Values.global.secretVolume.mountPath }}
              readOnly: {{ .Values.global.secretVolume.readOnly }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.global.secretVolume.enabled }}
      volumes:
        - name: notification-secrets
          secret:
            secretName: {{ include "notification-control-plane.secretVolumeName" . }}
      {{- end }}

