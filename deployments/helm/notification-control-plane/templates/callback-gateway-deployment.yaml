apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notification-control-plane.componentName" (list . "callback-gateway") }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.callbackGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "notification-control-plane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: callback-gateway
  template:
    metadata:
      labels:
        {{- include "notification-control-plane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: callback-gateway
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: callback-gateway
          image: {{ include "notification-control-plane.image" (list . "callback-gateway") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.callbackGateway.port }}
          env:
            - name: APP_ENV
              value: {{ .Values.global.appEnv | quote }}
            - name: APP_VERSION
              value: {{ default .Chart.AppVersion .Values.global.appVersion | quote }}
            - name: PORT
              value: {{ .Values.callbackGateway.port | quote }}
            - name: DATABASE_URL
              value: {{ required "database.url is required" .Values.database.url | quote }}
          volumeMounts:
            {{- if .Values.global.secretVolume.enabled }}
            - name: notification-secrets
              mountPath: {{ .Values.global.secretVolume.mountPath }}
              readOnly: {{ .Values.global.secretVolume.readOnly }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.global.secretVolume.enabled }}
        - name: notification-secrets
          secret:
            secretName: {{ include "notification-control-plane.secretVolumeName" . }}
        {{- end }}
