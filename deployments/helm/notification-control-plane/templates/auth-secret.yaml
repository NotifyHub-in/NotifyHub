{{- if .Values.auth.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "notification-control-plane.authSecretName" . }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.adminTokenKey }}: {{ required "auth.adminToken is required when auth.createSecret is true" .Values.auth.adminToken | quote }}
  {{ .Values.auth.readTokenKey }}: {{ required "auth.readToken is required when auth.createSecret is true" .Values.auth.readToken | quote }}
{{- end }}
