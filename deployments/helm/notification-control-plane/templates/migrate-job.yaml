apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "notification-control-plane.componentName" (list . "migrate") }}
  labels:
    {{- include "notification-control-plane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "notification-control-plane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ include "notification-control-plane.image" (list . "migrate") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: DATABASE_URL
              value: {{ required "database.url is required" .Values.database.url | quote }}
            - name: MIGRATIONS_DIR
              value: /app/migrations
