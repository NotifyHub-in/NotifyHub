services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notification_control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_control_plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8085:8080"

  adminer:
    image: adminer:5.2.1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8080"

  api:
    build:
      context: ../..
      dockerfile: build/docker/api.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_NOTIFICATION_TOPIC: notification.requests
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../..
      dockerfile: build/docker/worker.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_NOTIFICATION_TOPIC: notification.requests
      KAFKA_WORKER_GROUP_ID: notification-worker
      CONNECTOR_WEBHOOK_URL: http://connector-webhook:8093
      CONNECTOR_EMAIL_URL: http://connector-email:8091
      CONNECTOR_SMS_URL: http://connector-sms:8092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      connector-webhook:
        condition: service_started
      connector-email:
        condition: service_started
      connector-sms:
        condition: service_started
    ports:
      - "8081:8081"

  callback-gateway:
    build:
      context: ../..
      dockerfile: build/docker/callback-gateway.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8082
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

  connector-email:
    build:
      context: ../..
      dockerfile: build/docker/connector-email.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8091
    ports:
      - "8091:8091"

  connector-sms:
    build:
      context: ../..
      dockerfile: build/docker/connector-sms.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8092
    ports:
      - "8092:8092"

  connector-webhook:
    build:
      context: ../..
      dockerfile: build/docker/connector-webhook.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8093
    ports:
      - "8093:8093"

volumes:
  postgres_data:
