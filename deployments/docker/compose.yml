services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notification_control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_control_plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:4.0.0
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8085:8080"

  api:
    build:
      context: ../..
      dockerfile: build/docker/api.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../..
      dockerfile: build/docker/worker.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"

  callback-gateway:
    build:
      context: ../..
      dockerfile: build/docker/callback-gateway.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8082
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

  connector-email:
    build:
      context: ../..
      dockerfile: build/docker/connector-email.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8091
    ports:
      - "8091:8091"

  connector-sms:
    build:
      context: ../..
      dockerfile: build/docker/connector-sms.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8092
    ports:
      - "8092:8092"

  connector-webhook:
    build:
      context: ../..
      dockerfile: build/docker/connector-webhook.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8093
    ports:
      - "8093:8093"

volumes:
  postgres_data:
