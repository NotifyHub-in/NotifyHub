services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notification_control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_control_plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../..
      dockerfile: build/docker/migrate.Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8085:8080"

  adminer:
    image: adminer:5.2.1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8086:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      api:
        condition: service_started
      worker:
        condition: service_started
      callback-gateway:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    command:
      - "--docker_only=true"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8088:8080"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
    ports:
      - "9187:9187"

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "--kafka.server=kafka:9092"
      - "--group.filter=notification-worker"
      - "--topic.filter=notification.requests"
    ports:
      - "9308:9308"

  api:
    build:
      context: ../..
      dockerfile: build/docker/api.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_NOTIFICATION_TOPIC: notification.requests
      NOTIFICATION_API_AUTH_REQUIRED: "false"
      NOTIFICATION_ADMIN_API_AUTH_REQUIRED: "true"
      NOTIFICATION_ADMIN_API_TOKEN: local-admin-token
      NOTIFICATION_READONLY_API_TOKEN: local-read-token
      NOTIFICATION_RATE_LIMIT_ENABLED: "false"
      NOTIFICATION_RATE_LIMIT_ANON_RPS: "2"
      NOTIFICATION_RATE_LIMIT_ANON_BURST: "4"
      NOTIFICATION_RATE_LIMIT_CLIENT_RPS: "10"
      NOTIFICATION_RATE_LIMIT_CLIENT_BURST: "20"
      NOTIFICATION_RATE_LIMIT_READ_RPS: "15"
      NOTIFICATION_RATE_LIMIT_READ_BURST: "30"
      NOTIFICATION_RATE_LIMIT_ADMIN_RPS: "10"
      NOTIFICATION_RATE_LIMIT_ADMIN_BURST: "20"
      NOTIFICATION_RATE_LIMIT_CLEANUP_INTERVAL: "5m"
      NOTIFICATION_RATE_LIMIT_ENTRY_TTL: "15m"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../..
      dockerfile: build/docker/worker.Dockerfile
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_NOTIFICATION_TOPIC: notification.requests
      KAFKA_WORKER_GROUP_ID: notification-worker
      CONNECTOR_WEBHOOK_URL: http://connector-webhook:8093
      CONNECTOR_EMAIL_URL: http://connector-email:8091
      CONNECTOR_SMS_URL: http://connector-sms:8092
      CONNECTOR_PUSH_URL: http://connector-push:8094
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      connector-webhook:
        condition: service_started
      connector-email:
        condition: service_started
      connector-sms:
        condition: service_started
      connector-whatsapp:
        condition: service_started
      connector-push:
        condition: service_started
    ports:
      - "8081:8081"

  callback-gateway:
    build:
      context: ../..
      dockerfile: build/docker/callback-gateway.Dockerfile
    volumes:
      - ${NOTIFICATION_SECRETS_DIR:-/tmp/notification-control-plane-secrets}:/run/notification-secrets:ro
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8082
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_control_plane?sslmode=disable
      CALLBACK_PROVIDER_SECRET: replace-me
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8082:8082"

  webhook-sink:
    image: mendhak/http-https-echo:31
    ports:
      - "8087:8080"

  connector-email:
    build:
      context: ../..
      dockerfile: build/docker/connector-email.Dockerfile
    volumes:
      - ${NOTIFICATION_SECRETS_DIR:-/tmp/notification-control-plane-secrets}:/run/notification-secrets:ro
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8091
      EMAIL_PROVIDER_API_KEY: replace-me
    ports:
      - "8091:8091"

  connector-sms:
    build:
      context: ../..
      dockerfile: build/docker/connector-sms.Dockerfile
    volumes:
      - ${NOTIFICATION_SECRETS_DIR:-/tmp/notification-control-plane-secrets}:/run/notification-secrets:ro
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8092
      SMS_PROVIDER_AUTH_TOKEN: replace-me
    ports:
      - "8092:8092"

  connector-webhook:
    build:
      context: ../..
      dockerfile: build/docker/connector-webhook.Dockerfile
    volumes:
      - ${NOTIFICATION_SECRETS_DIR:-/tmp/notification-control-plane-secrets}:/run/notification-secrets:ro
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8093
      WEBHOOK_PROVIDER_SHARED_SECRET: replace-me
    ports:
      - "8093:8093"

  connector-push:
    build:
      context: ../..
      dockerfile: build/docker/connector-push.Dockerfile
    volumes:
      - ${NOTIFICATION_SECRETS_DIR:-/tmp/notification-control-plane-secrets}:/run/notification-secrets:ro
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8094
      PUSH_PROVIDER_SERVICE_ACCOUNT_JSON: '{"access_token":"replace-me"}'
    ports:
      - "8094:8094"

  connector-whatsapp:
    build:
      context: ../..
      dockerfile: build/docker/connector-whatsapp.Dockerfile
    volumes:
      - ${NOTIFICATION_SECRETS_DIR:-/tmp/notification-control-plane-secrets}:/run/notification-secrets:ro
    environment:
      APP_ENV: local
      APP_VERSION: dev
      PORT: 8095
      WHATSAPP_GUPSHUP_PASSWORD: replace-me
      WHATSAPP_KARIX_KEY: replace-me
    ports:
      - "8095:8095"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
