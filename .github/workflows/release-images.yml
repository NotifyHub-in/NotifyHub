name: Release Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, with or without a leading v"
        required: true
        type: string
      registry:
        description: "Container registry host, for example ghcr.io or 123456789012.dkr.ecr.ap-south-1.amazonaws.com"
        required: false
        type: string
      namespace:
        description: "Image namespace or repository prefix, for example my-org/notification-control-plane"
        required: false
        type: string
      aws-region:
        description: "AWS region for ECR releases, for example ap-south-1"
        required: false
        type: string
      aws-role-arn:
        description: "IAM role ARN to assume for ECR pushes"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION_INPUT: ${{ github.event.inputs.version || '' }}
      REGISTRY_INPUT: ${{ github.event.inputs.registry || '' }}
      NAMESPACE_INPUT: ${{ github.event.inputs.namespace || '' }}
      AWS_REGION_INPUT: ${{ github.event.inputs['aws-region'] || '' }}
      AWS_ROLE_ARN_INPUT: ${{ github.event.inputs['aws-role-arn'] || '' }}
      DEFAULT_REGISTRY: ghcr.io
      DEFAULT_NAMESPACE: ${{ github.repository }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: build/docker/api.Dockerfile
          - name: worker
            dockerfile: build/docker/worker.Dockerfile
          - name: callback-gateway
            dockerfile: build/docker/callback-gateway.Dockerfile
          - name: migrate
            dockerfile: build/docker/migrate.Dockerfile
          - name: connector-email
            dockerfile: build/docker/connector-email.Dockerfile
          - name: connector-sms
            dockerfile: build/docker/connector-sms.Dockerfile
          - name: connector-webhook
            dockerfile: build/docker/connector-webhook.Dockerfile
          - name: connector-push
            dockerfile: build/docker/connector-push.Dockerfile
          - name: connector-whatsapp
            dockerfile: build/docker/connector-whatsapp.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${VERSION_INPUT}"
          fi

          version="${version#v}"
          if [ -z "$version" ]; then
            echo "release version cannot be empty" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve registry target
        id: target
        shell: bash
        run: |
          registry="${REGISTRY_INPUT:-$DEFAULT_REGISTRY}"
          namespace="${NAMESPACE_INPUT:-$DEFAULT_NAMESPACE}"

          if [ -z "$registry" ]; then
            echo "registry cannot be empty" >&2
            exit 1
          fi

          if [ -z "$namespace" ]; then
            echo "namespace cannot be empty" >&2
            exit 1
          fi

          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"

      - name: Resolve registry auth mode
        id: auth
        shell: bash
        run: |
          registry="${{ steps.target.outputs.registry }}"
          mode="custom"
          region="${AWS_REGION_INPUT}"
          role_arn="${AWS_ROLE_ARN_INPUT}"

          if [ "$registry" = "ghcr.io" ]; then
            mode="ghcr"
          elif printf '%s' "$registry" | grep -Eq '\.dkr\.ecr\.[^.]+\.amazonaws\.com(\.cn)?$'; then
            mode="ecr"
            if [ -z "$region" ]; then
              region="$(printf '%s' "$registry" | sed -n 's#.*\.dkr\.ecr\.\([^.]*\)\.amazonaws\.com.*#\1#p')"
            fi
            if [ -z "$region" ]; then
              echo "AWS region is required for ECR releases; pass aws-region or use an ECR registry host that includes the region" >&2
              exit 1
            fi
            if [ -z "$role_arn" ]; then
              echo "aws-role-arn is required for ECR releases" >&2
              exit 1
            fi
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "role_arn=$role_arn" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials for ECR
        if: steps.auth.outputs.mode == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.auth.outputs.role_arn }}
          aws-region: ${{ steps.auth.outputs.region }}

      - name: Log in to ECR
        if: steps.auth.outputs.mode == 'ecr'
        shell: bash
        run: |
          aws ecr get-login-password --region "${{ steps.auth.outputs.region }}" | docker login --username AWS --password-stdin "${{ steps.target.outputs.registry }}"

      - name: Resolve registry credentials
        id: creds
        if: steps.auth.outputs.mode == 'custom' || steps.auth.outputs.mode == 'ghcr'
        shell: bash
        run: |
          if [ "${{ steps.auth.outputs.mode }}" = "ghcr" ]; then
            echo "username=${{ github.actor }}" >> "$GITHUB_OUTPUT"
            echo "password=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${REGISTRY_USERNAME}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "registry auth secrets REGISTRY_USERNAME and REGISTRY_PASSWORD are required for non-ECR custom registries" >&2
            exit 1
          fi

          echo "username=${REGISTRY_USERNAME}" >> "$GITHUB_OUTPUT"
          echo "password=${REGISTRY_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Log in to registry
        if: steps.auth.outputs.mode == 'custom' || steps.auth.outputs.mode == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.target.outputs.registry }}
          username: ${{ steps.creds.outputs.username }}
          password: ${{ steps.creds.outputs.password }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          load: false
          platforms: linux/amd64
          tags: |
            ${{ steps.target.outputs.registry }}/${{ steps.target.outputs.namespace }}/${{ matrix.name }}:${{ steps.version.outputs.value }}
            ${{ steps.target.outputs.registry }}/${{ steps.target.outputs.namespace }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
